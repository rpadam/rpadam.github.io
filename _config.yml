  - title: Experience
    layout: list
    content:
      - layout: left
        title: Engineering Manager
        sub_title: Workiva
        caption: June 2021 - Present
        quote: >
          I've been lucky to work with many talented engineers. Leading engineers in their day-to-day and careers continues to be something that brings me joy. I strive to create an environment where teams can release quality software in a positive and sustainable way.
        description: |
            As an Engineering Manager, I've led the Developer Experience, Identity and Access Management, and Public APIs teams. This comes with a diverse set of considerations and technologies that require different types of stakeholder and leadership engagement.

            Identity and Access Management serves a critical role in upholding customer trust by providing robust authentication and authorization options for every business user's needs.
            Public APIs are a gateway into exciting automation opportunities for customers. Consistency and predictability with Workiva's Public APIs are critical for instilling confidence in customers.
            Developer Experience takes a step back and looks at internal engineering teams as our customer base. How do we serve our engineers' needs? How can we operate more efficiently as an R&D organization? It's a fun and challenging landscape filled with opportunities and eager stakeholders.

      - layout: left
        title: Senior Software Development Engineer in Test, Tech Lead
        sub_title: Workiva
        caption: June 2017 - June 2021
        quote: >
          Being in a Senior SDET role allowed me to lead teams and formally mentor other engineers across the organization.
        description: |
            As a Senior SDET, I supported teams in adopting new test frameworks while mentoring and managing engineers.

      - layout: left
        title: Software Development Engineer in Test
        sub_title: Workiva
        caption: Jan 2014 - June 2017
        quote: >
          I was part of the first group of engineers to receive the title of SDET—a role focused on scalable quality practices across the organization. This formative phase in my career saw me and other SDETs shaping what the role would become.
        description: |

      - layout: left
        title: Quality Assurance Analyst Intern
        sub_title: WebFilings
        caption: March 2012 - Jan 2014
        quote: >
          My internship with WebFilings was an amazing and fun introduction to the software industry. WebFilings was a blossoming startup with a positive work culture where everyone worked and played hard.
        description: |
            As a Quality Assurance Analyst Intern, I was given opportunities on par with full-time analysts. I was entrusted with creating testing plans for our software suites, writing automated tests, and ensuring my teams could deliver quality code with expediency.

      - layout: left
        title: IT Support and Front Desk
        sub_title: Neurology Specialists LLC
        caption: Jan 2008 - May 2009
        description: |
            As IT Support and Front Desk at Neurology Specialists LLC, my responsibilities ranged from handling sensitive patient information and scheduling to addressing computer issues around the office.

  - title: Education
    layout: list
    content:
      - layout: left
        title: Iowa State University
        caption: 2009 - 2013
        sub_title: Bachelor of Science in Management Information Systems
        description: |
          Growing up in Minnesota, I was determined to venture to another state for my college education.
          I began at Iowa State University as a Biology major with the intention of going to medical school.
          Two years into my studies, I realized I wanted to make a change and follow my passion for technology.
          I switched majors to Management Information Systems, which deepened my understanding of IT and software development.
          Within three months of switching majors, I landed my first technology internship with WebFilings—and knew I had made the right decision.

  - title: More About Me
    layout: text
    content: |
      While much of my passion centers around software and people, I also have hobbies and interests that keep me grounded:

      - **3D Printing** – Great for tinkerers and problem solvers
      - **Homelab** – I host several servers and recently built my own router running OPNsense
      - **Electronics and Hardware Tinkering** – Think Raspberry Pis and Arduinos
      - **Reading** – Mostly science fiction these days
      - **Domestic and International Travel** – I let my stomach guide me

      Eating raw pickled herring in Museumplein, Amsterdam, was one of my favorite travel memories—I enjoy trying new foods.

